#########################################################################
# Dependabot configuration file
#########################################################################

version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.DEPENDABOT_TOKEN}}

updates:
  ###################################
  # Poetry  #########################
  ###################################
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00" #UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "
    versioning-strategy: increase
    cooldown:
      default-days: 7
  # Coordinator Container
  - package-ecosystem: "docker"
    directory: "/packages/coordinator"
    rebase-strategy: "disabled"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "20:00" #UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "
    cooldown:
      default-days: 7
  # EPSAT Container
  - package-ecosystem: "docker"
    directory: "/packages/tool/site"
    rebase-strategy: "disabled"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "22:00" #UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    # Workflow files stored in the
    # default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "01:00" #UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "
    cooldown:
      default-days: 7
  ###################################
  # NPM workspace  ##################
  ###################################
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:00" #UTC
    open-pull-requests-limit: 20
    commit-message:
      prefix: "Upgrade: [dependabot] - "
    versioning-strategy: increase
    registries:
      - npm-github
    cooldown:
      default-days: 7
    ignore:
    # The latest update to @types/fhir was 0.0.41.
    #   Dependabot tried to bump to '3.0.2', which doesn't exist
    #   https://github.com/NHSDigital/electronic-prescription-service-api/pull/4587
      - dependency-name: "@types/fhir"
