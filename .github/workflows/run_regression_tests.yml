name: Run Regression Tests

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      VERSION_NUMBER:
        required: true
        type: string
      REGRESSION_TESTS_PEM:
        type: string
      PRODUCT:
        type: string
      pull_request_id:
        type: string
        required: false
        default: ""
      pinned_image:
        type: string
        required: true
    secrets:
      REGRESSION_TESTS_PEM:
        required: true

jobs:
  run_regression_tests:
    runs-on: ubuntu-22.04
    container:
      image: ${{ inputs.pinned_image }}
      options: --user 1001:1001 --group-add 128
    defaults:
      run:
        shell: bash
    environment: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: write

    steps:
      - name: copy .tool-versions
        run: |
          cp /home/vscode/.tool-versions "$HOME/.tool-versions"
      - name: Checkout local github actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Generate a token to authenticate regression testing
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        with:
          app-id: ${{ vars.REGRESSION_TESTS_APP_ID }}
          private-key: ${{ secrets.REGRESSION_TESTS_PEM }}
          owner: "NHSDigital"
          repositories: "electronic-prescription-service-api-regression-tests"

      - name: Run Regression Testing
        working-directory: scripts
        if: ${{ (inputs.ENVIRONMENT != 'prod') && (inputs.ENVIRONMENT != 'ref') }}
        env:
          TARGET_ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          VERSION_NUMBER: ${{ inputs.VERSION_NUMBER }}
          GITHUB-TOKEN: ${{ steps.generate-token.outputs.token }}
          PULL_REQUEST_ID: ${{ inputs.pull_request_id }}
        run: |
          if [[ "$TARGET_ENVIRONMENT" != "prod" && "$TARGET_ENVIRONMENT" != "ref" ]]; then
            # this should be the tag of the tests you want to run
            REGRESSION_TEST_REPO_TAG=AEA-4652-add-prescription-order-endpoint-signature-validation

            # this should be the tag of the regression test workflow you want to run
            # This will normally be the same as REGRESSION_TEST_REPO_TAG
            REGRESSION_TEST_WORKFLOW_TAG=AEA-4652-add-prescription-order-endpoint-signature-validation

            # If the workflow tag doesn't start with `v`, it's a PR and we need to use the path heads, instead of refs
            # e.g. refs/heads/aea-0000-test-pr/scripts/run_regression_tests.py
            # vs   refs/tags/v3.9.0/scripts/run_regression_tests.py
            if [[ "$REGRESSION_TEST_WORKFLOW_TAG" != v* ]]; then
              TARGET=refs/heads
            else
              TARGET=refs/tags
            fi

            curl https://raw.githubusercontent.com/NHSDigital/electronic-prescription-service-api-regression-tests/${TARGET}/${REGRESSION_TEST_WORKFLOW_TAG}/scripts/run_regression_tests.py -o run_regression_tests.py
            poetry install
            echo Running regression tests in the "$TARGET_ENVIRONMENT" environment
            poetry run python -u run_regression_tests.py \
            --env="$TARGET_ENVIRONMENT" \
            --pr_label="$VERSION_NUMBER" \
            --token=${{ steps.generate-token.outputs.token }} \
            --is_called_from_github=true \
            --product=${{ inputs.PRODUCT }} \
            --regression_test_repo_tag "${REGRESSION_TEST_REPO_TAG}" \
            --regression_test_workflow_tag "${REGRESSION_TEST_WORKFLOW_TAG}" \
            --pull_request_id="${PULL_REQUEST_ID}"
          fi
